<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать книгу</title>

    <style>
        /* ===== Тело страницы (твой градиент) ===== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ===== Контейнер формы ===== */
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }

        .form-title {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ===== Группы полей ===== */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-label .required {
            color: #e74c3c;
            margin-left: 3px;
        }

        /* ===== Поля ввода ===== */
        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #333;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            transform: translateY(-1px);
        }

        .form-input::placeholder {
            color: #aaa;
        }

        /* ===== Ошибки валидации ===== */
        .form-error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            display: block;
            font-weight: 500;
        }

        .form-input.error {
            border-color: #e74c3c;
            background: #fff5f5;
        }

        .form-input.error:focus {
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.15);
        }

        /* ===== Кнопки ===== */
        .form-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .form-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .form-cancel {
            display: block;
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-cancel:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2 class="form-title">✏️ Редактировать книгу</h2>

    <form th:method="PATCH" th:action="@{/books/{id}(id=${book.getBook_id()})}" th:object="${book}">

        <!-- Название -->
        <div class="form-group">
            <label class="form-label" for="title">
                Название <span class="required">*</span>
            </label>
            <input type="text"
                   class="form-input"
                   th:field="*{title}"
                   id="title"
                   placeholder="Введите название книги"
                   th:classappend="${#fields.hasErrors('title')} ? 'error'">
            <div class="form-error"
                 th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}">Title error</div>
        </div>

        <!-- Автор -->
        <div class="form-group">
            <label class="form-label" for="author">
                Автор <span class="required">*</span>
            </label>
            <input type="text"
                   class="form-input"
                   th:field="*{author}"
                   id="author"
                   placeholder="Введите имя автора"
                   th:classappend="${#fields.hasErrors('author')} ? 'error'">
            <div class="form-error"
                 th:if="${#fields.hasErrors('author')}"
                 th:errors="*{author}">Author error</div>
        </div>

        <!-- Год -->
        <div class="form-group">
            <label class="form-label" for="year">Год издания</label>
            <input type="text"
                   class="form-input"
                   th:field="*{year}"
                   id="year"
                   placeholder="2024"
                   th:classappend="${#fields.hasErrors('year')} ? 'error'">
            <div class="form-error"
                 th:if="${#fields.hasErrors('year')}"
                 th:errors="*{year}">Year error</div>
        </div>

        <!-- Кнопки -->
        <button type="submit" class="form-submit">✅ Обновить книгу</button>
        <a href="/books" class="form-cancel">✕ Отмена</a>

    </form>
</div>
</body>
</html>
