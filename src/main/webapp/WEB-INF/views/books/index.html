<!DOCTYPE html>
<html lang="en" xmlns::th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Книги</title>
</head>
<body>

<div th:each="book :${books}">
    <a th:href="@{/books/{id}(id=${book.getBookID()})}"
       th:text="${book.getTitle()} + ', ' +${book.getAuthor()} + ', ' + ${book.getYear()}">book</a>
</div>

<br>
<hr>

<a th:href="@{/books/new}">Добавить новую книгу</a>

</body>
</html>
