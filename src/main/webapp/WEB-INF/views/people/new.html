<!DOCTYPE html>
<html lang="en" xmlns::th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление читателя</title>
</head>
<body>

<form th:method="POST" th:action="@{/people}" th:object="${person}">
    <label for="fullName">Введите ФИО</label>
    <input type="text" th:field="*{fullName}" id="fullName">
    <div style="color:red" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">Full name error</div>
    <br>

    <label for="birthDate">Введите год рождения</label>
    <input type="text" th:field="*{birthDate}" id="birthDate">
    <div style="color:red" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}">Birth date error</div>
    <br>

    <input type="submit" value="Добавить читателя">
</form>
<br>
<hr>
<form th:method="GET" th:action="@{/people}">
    <input type="submit" value="К списку людей">
</form>
<br>
<form th:method="GET" th:action="@{/main}">
    <input type="submit" value="На главную">
</form>
</body>
</html>
