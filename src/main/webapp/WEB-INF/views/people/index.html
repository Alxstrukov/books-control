<!DOCTYPE html>
<html lang="en" xmlns::th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Читатели</title>
</head>
<body>

<div th:each="person :${people}">
    <a th:href="@{/people/{id}(id=${person.getPerson_id()})}"
       th:text="${person.getFullName()} + ', ' +${person.getBirthDate()}" class="btn btn-secondary">book</a>
</div>

<br>
<hr>

<a th:href="@{/people/new}" class="btn btn-blue">Добавить нового читателя</a>

</body>
</html>
