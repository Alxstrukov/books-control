<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;  /* Элементы друг под другом */
            justify-content: center;
            align-items: center;
        }

        /* Контейнер для всего контента */
        .container {
            text-align: center;      /* Центрирует текст заголовка */
            padding: 50px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Заголовок */
        h1 {
            text-transform: uppercase;
            font-size: 48px;
            color: white;
            margin-bottom: 30px;     /* Отступ снизу до кнопок */
            text-align: center;
        }

        /* Контейнер для кнопок */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center; /* Кнопки по центру */
        }

        /* Стили кнопок */
        .btn {
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-secondary {
            background: transparent;
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Заголовок ОТДЕЛЬНО -->
    <h1>Добро пожаловать в библиотеку</h1>

    <!-- Кнопки ОТДЕЛЬНО -->
    <div class="button-group">
        <a href="/books" class="btn btn-blue">Перейти к списку книг</a>
        <a href="/people" class="btn btn-green">Перейти к списку читателей</a>
    </div>
</div>
</body>
</html>
